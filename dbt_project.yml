name: revops_pipeline
version: '1.0.0'
config-version: 2

profile: 'revops_project'

model-paths: ["models"]
test-paths:  ["tests"]
seed-paths:  ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

# ── Model Configurations ──────────────────────────────
models:
  revops_pipeline:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: int
    marts:
      +materialized: table
      +schema: marts

# ── Test Configurations ───────────────────────────────
tests:
  revops_pipeline:
    # Staging: warn — don't stop if data is flowing
    staging:
      +severity: warn
      +store_failures: true       # failures written in DB — for monitoring
      +schema: test_failures

    # Intermediate: error — stop if JOIN logic fails
    intermediate:
      +severity: error
      +store_failures: true
      +schema: test_failures

    # Marts: error — don't show incorrect data to BI
    marts:
      +severity: error
      +store_failures: true
      +schema: test_failures

# ── Vars ─────────────────────────────────────────────
vars:
  # Used in int_account_health
  inactive_days_threshold: 30
  at_risk_response_hours: 24
  at_risk_open_tickets: 3
  at_risk_days_since_active: 14
