# dbt profile used by Vercel deployments and local execution.
revops_project:
  target: duckdb_dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_POSTGRES_HOST') }}"
      port: "{{ env_var('DBT_POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('DBT_POSTGRES_USER') }}"
      password: "{{ env_var('DBT_POSTGRES_PASSWORD') }}"
      dbname: "{{ env_var('DBT_POSTGRES_DBNAME', 'revops_database') }}"
      schema: raw
      threads: 4

    duckdb_dev:
      type: duckdb
      path: './duckdb/revops_analytics.duckdb'
      schema: revops
      extensions:
        - postgres
