version: 2

models:
  - name: dim_accounts
    description: >
      Current state of an Account. Grain: one row = one account.
    columns:
      - name: account_id
        data_tests: [not_null, unique]
      - name: account_name
        data_tests: [not_null]
      - name: mrr
        description: "coalesce(ah.mrr, 0) - cannot be null"
      - name: arr
        description: "mrr * 12. Calculated here only."
      - name: account_segment
        data_tests:
          - accepted_values:
              arguments: # <--- FIX: arguments added for dbt 1.7+
                values: [enterprise, mid_market, smb, unmonetized]
      - name: health_status
        data_tests:
          - accepted_values:
              arguments:
                values: [healthy, at_risk, inactive, churned]
      - name: subscription_status
        data_tests:
          - accepted_values:
              arguments:
                values: [active, past_due, trialing, cancelled]
              severity: warn
      - name: total_contacts
        description: "Derived via coalesce() - cannot be null"
      - name: open_opportunities
        description: "Derived via coalesce() - cannot be null"
      - name: total_won_amount
        description: "Derived via coalesce() - cannot be null"
      - name: updated_at
        description: "current_timestamp - cannot be null"

  - name: fct_revenue
    description: >
      Monthly MRR waterfall. Grain: one row = account × month.
    columns:
      - name: account_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_accounts')
                field: account_id
      - name: revenue_month
        description: "Filtered by is not null in SQL"
      - name: mrr
        description: "Validated upstream"
      - name: arr
        description: "Validated upstream"
      - name: mrr_type
        data_tests:
          - accepted_values:
              arguments:
                values: [new, expansion, contraction, stable, churned, trial]
      - name: updated_at
        description: "current_timestamp - cannot be null"

  - name: fct_pipeline
    description: >
      Lead → won sales funnel. Grain: one row = one lead.
    columns:
      - name: lead_id
        data_tests: [not_null, unique]
      - name: email
        data_tests: [not_null]
      - name: lead_created_at
        data_tests: [not_null]
      - name: funnel_stage
        data_tests:
          - accepted_values:
              arguments:
                values: [lead, mql, sql, in_pipeline, won, lost]
      - name: lead_score
        data_tests: [not_null]
      - name: days_lead_to_opp
        description: "Days from lead creation to opportunity creation."
      - name: days_opp_to_close
        description: "Days from opportunity creation to closing."
      - name: opportunity_id
        description: "Opportunity ID tied to the lead."
      - name: updated_at
        description: "current_timestamp - cannot be null"

  - name: dim_dates
    description: >
      Universal date dimension table for time-series analysis.
      Grain: one row = one calendar date from 2020-01-01 onwards.
    columns:
      - name: date_day
        description: "The actual date (primary key)"
        data_tests: [not_null, unique]
      - name: date_id
        description: "Same as date_day for backward compatibility"
      - name: year
        description: "Calendar year"
      - name: quarter
        description: "Quarter (1-4)"
      - name: month
        description: "Month (1-12)"
      - name: year_month
        description: "YYYY-MM format"
      - name: week_of_year
        description: "Week number (1-53)"
      - name: year_week
        description: "YYYY-WNN format"
      - name: day_of_month
        description: "Day of month (1-31)"
      - name: day_of_week_num
        description: "Day of week number (0=Sunday to 6=Saturday)"
      - name: day_of_week_name
        description: "Day of week name (Sunday-Saturday)"
      - name: day_of_year
        description: "Day of year (1-366)"
      - name: is_weekend
        description: "True if Saturday or Sunday"
      - name: is_holiday
        description: "True if US federal holiday"
      - name: fiscal_year
        description: "Fiscal year (currently same as calendar year)"
      - name: fiscal_quarter
        description: "Fiscal quarter"
      - name: fiscal_month
        description: "Fiscal month"
      - name: updated_at
        description: "current_timestamp - cannot be null"