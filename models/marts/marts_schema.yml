version: 2

models:
  - name: dim_accounts
    description: >
      Current state of an Account. Grain: one row = one account.
    columns:
      - name: account_id
        data_tests: [not_null, unique]
      - name: account_name
        data_tests: [not_null]
      - name: mrr
        data_tests: [not_null]
      - name: arr
        description: "mrr * 12. Calculated here only."
        data_tests: [not_null]
      - name: account_segment
        data_tests:
          - not_null
          - accepted_values:
              arguments: # <--- FIX: arguments added for dbt 1.7+
                values: [enterprise, mid_market, smb, unmonetized]
      - name: health_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [healthy, at_risk, inactive, churned]
      - name: subscription_status
        data_tests:
          - accepted_values:
              arguments:
                values: [active, past_due, trialing, cancelled]
              severity: warn
      - name: total_contacts
        data_tests: [not_null]
      - name: open_opportunities
        data_tests: [not_null]
      - name: total_won_amount
        data_tests: [not_null]
      - name: updated_at
        data_tests: [not_null]

  - name: fct_revenue
    description: >
      Monthly MRR waterfall. Grain: one row = account × month.
    columns:
      - name: account_id
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_accounts')
              field: account_id
      - name: revenue_month
        data_tests: [not_null]
      - name: mrr
        data_tests: [not_null]
      - name: arr
        data_tests: [not_null]
      - name: mrr_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [new, expansion, contraction, stable, churned, trial]
      - name: updated_at
        data_tests: [not_null]

  - name: fct_pipeline
    description: >
      Lead → won sales funnel. Grain: one row = one lead.
    columns:
      - name: lead_id
        data_tests: [not_null, unique]
      - name: email
        data_tests: [not_null]
      - name: lead_created_at
        data_tests: [not_null]
      - name: funnel_stage
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [lead, mql, sql, in_pipeline, won, lost]
      - name: lead_score
        data_tests: [not_null]
      - name: days_lead_to_opp
        description: "Days from lead creation to opportunity creation."
      - name: days_opp_to_close
        description: "Days from opportunity creation to closing."
      - name: opportunity_id
        description: "Opportunity ID tied to the lead."
      - name: updated_at
        data_tests: [not_null]