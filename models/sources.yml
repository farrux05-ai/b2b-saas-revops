version: 2

sources:
  - name: revops_raw
  
    database: "revops_database"
    schema: raw
    description: >
      Raw data source from Postgres.
      Never mutated directly — append-only.

    freshness:
      warn_after: { count: 24, period: hour }
      error_after: { count: 48, period: hour }
    loaded_at_field: _loaded_at

    tables:
      # ── Marketing ─────────────────────────────────────
      - name: leads
        description: HubSpot form submissions and inbound leads
        freshness:
          warn_after: { count: 6, period: hour }

      - name: campaigns
        description: HubSpot marketing campaigns — budget, date, channel

      - name: campaign_members
        description: Which lead participated in which campaign (bridge table)

      # ── CRM ───────────────────────────────────────────
      - name: accounts
        description: HubSpot companies — core entity in B2B
        freshness:
          warn_after: { count: 6, period: hour }

      - name: contacts
        description: HubSpot contacts — people associated with an account

      - name: opportunities
        description: HubSpot deals — sales pipeline

      - name: activities
        description: HubSpot engagements — call, email, meeting logs

      # ── Product ───────────────────────────────────────
      - name: product_companies
        description: Mixpanel group analytics — usage at the account level

      - name: product_users
        description: Mixpanel user profiles — who logged in and when

      - name: product_events
        description: Mixpanel raw events — various action logs
        freshness:
          warn_after: { count: 2, period: hour }

      # ── Billing ───────────────────────────────────────
      - name: subscriptions
        description: Stripe subscriptions — plan, MRR, status

      - name: invoices
        description: Stripe invoices — monthly billing

      - name: payments
        description: Stripe payment_intents — successful and failed payments

      # ── Support ───────────────────────────────────────
      - name: tickets
        description: Intercom conversations — support requests

      - name: ticket_comments
        description: Intercom conversation parts — message history

      # ── Infrastructure ────────────────────────────────
      - name: dead_letter
        description: Ingestion errors — for monitoring
        freshness: null  # monitoring table, freshness not required
