version: 2

models:
  - name: stg_accounts
    columns:
      - name: id
        tests: [not_null, unique]

      - name: name
        tests: [not_null]

  - name: stg_contacts
    columns:
      - name: id
        tests: [not_null, unique]

      - name: account_id
        tests:
          - relationships:
              arguments:
                to: ref('stg_accounts')
                field: id
              severity: warn

  - name: stg_opportunities
    columns:
      - name: id
        tests: [not_null, unique]

      - name: account_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_accounts')
                field: id

      - name: stage
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [prospecting, qualification, proposal, closed_won, closed_lost]
              severity: warn