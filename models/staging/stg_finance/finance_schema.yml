version: 2

models:
  - name: stg_subscriptions
    columns:
      - name: id
        data_tests: [not_null, unique]

      - name: account_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_accounts')
                field: id
              severity: warn

      - name: status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [active, trialing, past_due, cancelled, unpaid, paused]

  - name: stg_invoices
    columns:
      - name: id
        data_tests: [not_null, unique]

      - name: subscription_id
        data_tests: [not_null]

      - name: account_id
        data_tests: [not_null]

      - name: status
        data_tests:
          - accepted_values:
              arguments:
                values: [draft, open, paid, void, uncollectible]
              severity: warn

  - name: stg_payments
    columns:
      - name: id
        data_tests: [not_null, unique]

      - name: invoice_id
        data_tests: [not_null]

      - name: account_id
        data_tests: [not_null]

      - name: status
        data_tests:
          - accepted_values:
              arguments:
                values: [succeeded, failed, refunded]
              severity: warn
