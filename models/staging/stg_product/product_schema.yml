version: 2

models:
  - name: stg_product_companies
    columns:
      - name: id
        data_tests: [not_null, unique]

      - name: account_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_accounts')
                field: id
              severity: warn

      - name: plan
        data_tests:
          - accepted_values:
              arguments:
                values: [free, starter, growth, enterprise]
              severity: warn

  - name: stg_product_users
    columns:
      - name: id
        data_tests: [not_null, unique]

      - name: account_id
        data_tests: [not_null]

      - name: status
        data_tests:
          - accepted_values:
              arguments:
                values: [active, inactive, churned]
              severity: warn

  - name: stg_product_events
    columns:
      - name: id
        data_tests: [not_null, unique]
