version: 2

models:
  - name: stg_product_companies
    columns:
      - name: id
        tests: [not_null, unique]

      - name: account_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_accounts')
              field: id
              severity: warn

      - name: plan
        tests:
          - accepted_values:
              values: [free, starter, growth, enterprise]
              severity: warn

      - name: is_plan_null
        tests: [not_null]

      - name: is_seat_null
        tests: [not_null]

      - name: is_account_unlinked
        tests: [not_null]

  - name: stg_product_users
    columns:
      - name: id
        tests: [not_null, unique]

      - name: account_id
        tests: [not_null]

      - name: status
        tests:
          - accepted_values:
              values: [active, inactive, churned]
              severity: warn

      - name: is_signup_null
        tests: [not_null]

      - name: is_last_seen_null
        tests: [not_null]

  - name: stg_product_events
    columns:
      - name: id
        tests: [not_null, unique]

      - name: is_date_null
        tests: [not_null]

      - name: is_properties_null
        tests: [not_null]
