version: 2

models:
  - name: stg_tickets
    columns:
      - name: id
        data_tests: [not_null, unique]

      - name: account_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_accounts')
                field: id
              severity: warn

      - name: status
        data_tests:
          - accepted_values:
              arguments:
                values: [open, pending, solved, closed]
              severity: warn

      - name: priority
        data_tests:
          - accepted_values:
              arguments:
                values: [low, normal, high, urgent]
              severity: warn

  - name: stg_ticket_comments
    columns:
      - name: id
        data_tests: [not_null, unique]

      - name: ticket_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_tickets')
                field: id

      - name: author_type
        data_tests:
          - accepted_values:
              arguments:
                values: [agent, customer]
              severity: warn
