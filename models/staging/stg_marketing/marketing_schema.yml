version: 2

models:
  - name: stg_leads
    description: >
      Cleaned lead records. Email duplicates are identified via email_row_num.
      Score and status mismatches are flagged.
    columns:
      - name: id
        data_tests: [not_null, unique]

      - name: status
        data_tests:
          - accepted_values:
              arguments:
                values: [new, mql, sql, disqualified]
              severity: warn

      - name: email_issue
        description: >
          NULL means no issue.
          Possible values: null_email, invalid_format, personal_domain.
        data_tests:
          - accepted_values:
              arguments:
                values: [null_email, invalid_format, personal_domain]
              severity: warn

      - name: created_at
        data_tests: [not_null]

  - name: stg_campaigns
    columns:
      - name: id
        data_tests: [not_null, unique]

      - name: name
        data_tests: [not_null]

      - name: type
        data_tests:
          - accepted_values:
              arguments:
                values: [paid_social, paid_search, event, outbound, seo, email]
              severity: warn

      - name: status
        data_tests:
          - accepted_values:
              arguments:
                values: [draft, active, paused, completed]
              severity: warn

  - name: stg_campaign_members
    columns:
      - name: id
        data_tests: [not_null, unique]

      - name: lead_id
        data_tests: [not_null]

      - name: campaign_id
        data_tests: [not_null]
