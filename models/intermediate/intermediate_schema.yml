version: 2

models:

  - name: int_accounts
    description: >
      Anchor model. stg_accounts ga billing, product va support signallarini
      birlashtiradi. stg_tickets va stg_invoices faqat shu yerda o'qiladi —
      int_account_health esa bu modeldan foydalanadi.
      Grain: bir qator = bir account.
    columns:
      - name: account_id
        tests: [not_null, unique]
      - name: account_name
        tests: [not_null]
      - name: mrr
        description: "coalesce(s.mrr, 0) — NULL bo'lmaydi"
        tests: [not_null]
      - name: subscription_status
        tests:
          - accepted_values:
              arguments:
                values: [active, past_due, trialing, cancelled]
              severity: warn
      - name: open_tickets
        tests: [not_null]
      - name: urgent_open_tickets
        tests: [not_null]
      - name: overdue_invoices
        tests: [not_null]

  - name: int_account_health
    description: >
      int_accounts ga product signallari (users, events) qo'shiladi va
      health_status hisoblanadi. stg_tickets bu yerda O'QILMAYDI.
      Grain: bir qator = bir account.
    columns:
      - name: account_id
        tests: [not_null, unique]
      - name: health_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [healthy, at_risk, inactive, churned]
      - name: total_users
        tests: [not_null]
      - name: active_users
        tests: [not_null]
      - name: events_last_30d
        tests: [not_null]

  - name: int_contacts
    description: >
      stg_contacts ga lead va campaign attribution ma'lumotlari qo'shiladi.
      Grain: bir qator = bir contact (deduplicated by email).
    columns:
      - name: contact_id
        tests: [not_null, unique]
      - name: account_id
        tests: [not_null]