version: 2

models:

  - name: int_accounts
    description: >
      Anchor model. Combines billing, product, and support signals to stg_accounts.
      stg_tickets and stg_invoices are only read here, and int_account_health
      uses this model downstream.
      Grain: one row = one account.
    columns:
      - name: account_id
        data_tests: [not_null, unique]
      - name: account_name
        data_tests: [not_null]
      - name: mrr
        description: "coalesce(s.mrr, 0) — never NULL"
      - name: subscription_status
        data_tests:
          - accepted_values:
              arguments:
                values: [active, past_due, trialing, cancelled]
              severity: warn
      - name: open_tickets
        description: "Derived via coalesce() - cannot be null"
      - name: urgent_open_tickets
        description: "Derived via coalesce() - cannot be null"
      - name: overdue_invoices
        description: "Derived via coalesce() - cannot be null"

  - name: int_account_health
    description: >
      Adds product signals (users, events) to int_accounts and calculates
      the health_status. stg_tickets is NOT read here.
      Grain: one row = one account.
    columns:
      - name: account_id
        data_tests:
          - not_null
          - unique
          - relationships:
              to: ref('int_accounts')
              field: account_id
      - name: health_status
        data_tests:
          - accepted_values:
              arguments:
                values: [healthy, at_risk, inactive, churned]
      - name: total_users
        description: "Derived via coalesce() - cannot be null"
      - name: active_users
        description: "Derived via coalesce() - cannot be null"
      - name: events_last_30d
        description: "Derived via coalesce() - cannot be null"

  - name: int_contacts
    description: >
      Adds lead and campaign attribution data to stg_contacts.
      Grain: one row = one contact (deduplicated by email).
    columns:
      - name: contact_id
        data_tests: [not_null, unique]
      - name: account_id
        data_tests:
          - relationships:
              to: ref('int_accounts')
              field: account_id