version: 2

# ============================================
# SEMANTIC MODELS - Modellar va ularning o'lchovlar
# ============================================

semantic_models:
  # Revenue model - pul olchovlari
  - name: fct_revenue
    model: ref('fct_revenue')
    
    defaults:
      agg_time_dimension: revenue_month
    
    entities:
      - name: account
        type: Foreign
        expr: account_id
      
    dimensions:
      - name: revenue_month
        type: time
        expr: revenue_month
        type_params:
          time_granularity: month
      
      - name: account_segment
        type: categorical
      
      - name: plan
        type: categorical
      
      - name: status
        type: categorical
      
      - name: mrr_type
        type: categorical
        description: "Revenue movement type: new, expansion, contraction, churned, stable"
    
    measures:
      - name: total_mrr
        description: "Monthly Recurring Revenue"
        agg: sum
        expr: mrr
      
      - name: total_arr
        description: "Annual Recurring Revenue"
        agg: sum
        expr: arr
      
      - name: mrr_change
        description: "Month-over-month MRR change"
        agg: sum
        expr: mrr_change
      
      - name: new_mrr
        description: "MRR from new customers"
        agg: sum
        expr: new_mrr_that_month
      
      - name: expansion_mrr
        description: "MRR increase from upgrades"
        agg: sum
        expr: expansion_mrr_that_month
      
      - name: contraction_mrr
        description: "MRR decrease from downgrades"
        agg: sum
        expr: contraction_mrr_that_month
      
      - name: churned_mrr
        description: "MRR lost from churned customers"
        agg: sum
        expr: churned_mrr_that_month
      
      - name: count_accounts
        description: "Number of accounts"
        agg: count_distinct
        expr: account_id

  # Account model - account metriklari
  - name: dim_accounts
    model: ref('dim_accounts')
    
    entities:
      - name: account
        type: primary
        expr: account_id
    
    dimensions:
      - name: account_segment
        type: categorical
        description: "enterprise, mid_market, smb, unmonetized"
      
      - name: health_status
        type: categorical
        description: "Account health: healthy, at_risk, unhealthy"
      
      - name: subscription_status
        type: categorical
      
      - name: product_plan
        type: categorical
    
    measures:
      - name: total_mrr
        description: "Total MRR across all accounts"
        agg: sum
        expr: mrr
      
      - name: total_arr
        description: "Total ARR across all accounts"
        agg: sum
        expr: arr
      
      - name: count_accounts
        description: "Total number of accounts"
        agg: count
        expr: account_id
      
      - name: count_healthy_accounts
        description: "Number of healthy accounts"
        agg: count
        expr: account_id
      
      - name: count_at_risk_accounts
        description: "Number of at-risk accounts"
        agg: count
        expr: account_id
      
      - name: avg_mrr
        description: "Average MRR per account"
        agg: average
        expr: mrr
      
      - name: total_contacts
        description: "Total number of contacts"
        agg: sum
        expr: total_contacts
      
      - name: total_open_opportunities
        description: "Total open opportunities"
        agg: sum
        expr: open_opportunities
      
      - name: total_won_amount
        description: "Total won opportunity amount"
        agg: sum
        expr: total_won_amount


# ============================================
# METRICS - Biznes metriklari
# ============================================

metrics:
  - name: mrr
    description: "Monthly Recurring Revenue"
    label: "MRR"
    type: simple
    type_params:
      measure: fct_revenue.total_mrr
    meta:
      format: currency
      tier: 1

  - name: arr
    description: "Annual Recurring Revenue"
    label: "ARR"
    type: simple
    type_params:
      measure: fct_revenue.total_arr
    meta:
      format: currency
      tier: 1

  - name: net_new_mrr
    description: "Net new MRR = New + Expansion - Contraction - Churned"
    label: "Net New MRR"
    type: derived
    type_params:
      expr: "new_mrr_metric + expansion_mrr_metric + contraction_mrr_metric + churned_mrr_metric"
    meta:
      format: currency

  - name: new_mrr_metric
    description: "MRR from new customers"
    label: "New MRR"
    type: simple
    type_params:
      measure: fct_revenue.new_mrr
    meta:
      format: currency

  - name: expansion_mrr_metric
    description: "MRR increase from expansion"
    label: "Expansion MRR"
    type: simple
    type_params:
      measure: fct_revenue.expansion_mrr
    meta:
      format: currency

  - name: contraction_mrr_metric
    description: "MRR decrease from downgrades"
    label: "Contraction MRR"
    type: simple
    type_params:
      measure: fct_revenue.contraction_mrr
    meta:
      format: currency

  - name: churned_mrr_metric
    description: "MRR lost from churned customers"
    label: "Churned MRR"
    type: simple
    type_params:
      measure: fct_revenue.churned_mrr
    meta:
      format: currency

  - name: churn_rate
    description: "Churn rate percentage"
    label: "Churn Rate"
    type: derived
    type_params:
      expr: "churned_mrr_metric / nullif(mrr + churned_mrr_metric, 0)"
    meta:
      format: percent

  - name: account_count
    description: "Total number of accounts"
    label: "Accounts"
    type: simple
    type_params:
      measure: count_accounts
    meta:
      format: number

  - name: healthy_accounts
    description: "Number of healthy accounts"
    label: "Healthy Accounts"
    type: simple
    type_params:
      measure: count_healthy_accounts
    meta:
      format: number

  - name: at_risk_accounts
    description: "Number of at-risk accounts"
    label: "At-Risk Accounts"
    type: simple
    type_params:
      measure: count_at_risk_accounts
    meta:
      format: number

  - name: account_health_score
    description: "Percentage of healthy accounts"
    label: "Health Score"
    type: derived
    type_params:
      expr: "healthy_accounts / nullif(account_count, 0)"
    meta:
      format: percent

  - name: avg_mrr_per_account
    description: "Average MRR per account"
    label: "Avg MRR"
    type: simple
    type_params:
      measure: avg_mrr
    meta:
      format: currency

  - name: total_pipeline
    description: "Total open opportunities amount"
    label: "Pipeline"
    type: simple
    type_params:
      measure: total_open_opportunities
    meta:
      format: currency
