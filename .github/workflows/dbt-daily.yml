name: Daily dbt run + docs update

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily
  workflow_dispatch:    # Manual trigger

jobs:
  dbt-run:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          cd revops_pipeline/revops_project
          python -m venv dbt-venv
          source dbt-venv/bin/activate
          pip install -U pip setuptools wheel
          pip install -r requirements.txt
      
      - name: Run dbt pipeline
        env:
          DBT_POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          DBT_POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DBT_POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          DBT_POSTGRES_PORT: ${{ secrets.POSTGRES_PORT || '5432' }}
        run: |
          cd revops_pipeline/revops_project
          source dbt-venv/bin/activate
          echo "Running dbt models..."
          dbt run --select state:modified+ --state ./target
          dbt snapshot
          echo "Running data quality tests..."
          dbt test --store-failures
          echo "Generating documentation..."
          dbt docs generate
      
      - name: Commit documentation
        run: |
          cd revops_pipeline/revops_project
          git config user.email "action@github.com"
          git config user.name "dbt Automation"
          git add target/
          git commit -m "chore: Automated dbt docs generation [skip ci]" || echo "No changes to commit"
          git push || echo "Push failed, skipping"
      
      - name: Test Dashboard Connection
        run: |
          cd revops_pipeline/revops_project/dashboards_v2
          npm ci --prefer-offline
          npm run sources || echo "Evidence sources check (non-blocking)"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Daily dbt run failed!"
          echo "Check GitHub Actions logs for details"
